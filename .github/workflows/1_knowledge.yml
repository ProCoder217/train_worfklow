name: "Step 1: Extract Teacher Knowledge"
on:
  workflow_dispatch:

jobs:
  knowledge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Removed cache: 'pip' to prevent index poisoning

      - name: Install PyTorch (CPU)
        run: pip install --no-cache-dir torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install HuggingFace & Pillow
        run: pip install --no-cache-dir datasets pillow --index-url https://pypi.org/simple/

      - name: Extract Knowledge
        run: python step1_knowledge.py

      - name: Save Knowledge (Cache)
        uses: actions/cache/save@v4
        with:
          path: output/soft_labels.pt
          key: soft-labels-v1

      - name: Cleanup Giant Files
        run: |
          rm -rf nanoVLM
          rm -rf output/soft_labels.pt
